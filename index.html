<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollywood Cut | Jazz & Western Edition</title>
    
    <!-- 设计字体系统 (Typography System) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@1,400..900&family=Rye&display=swap" rel="stylesheet">
    
    <!-- 核心运行库 (Core Libraries via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 动画与图标 (UI Tools) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'klein-blue': '#002FA7',
                        'sunset-orange': '#FF4500',
                        'warm-paper': '#FAF9F6',
                        'saddle-brown': '#8B4513',
                    },
                    fontFamily: {
                        cinematic: ['"Playfair Display"', 'serif'],
                        western: ['Rye', 'cursive'],
                        ui: ['Inter', 'sans-serif'],
                        mono: ['monospace'],
                    },
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #FAF9F6;
            color: #002FA7;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        .title-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        .border-klein { border: 2px solid #002FA7; }
        .border-klein-thick { border: 4px solid #002FA7; }
        .atmosphere-layer {
            position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.1; overflow: hidden;
        }
        .floating { position: absolute; animation: float 8s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .folded-paper { position: relative; background: white; }
        .folded-paper::after {
            content: ''; position: absolute; top: 0; right: 0; width: 0; height: 0;
            border-style: solid; border-width: 0 30px 30px 0;
            border-color: transparent transparent #002FA7 transparent; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="atmosphere" class="atmosphere-layer"></div>
    <div id="root" class="relative z-10 w-full min-h-screen flex flex-col"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (window.lucide && spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide[name] },
                        root: spanRef.current,
                        nameAttr: 'data-lucide',
                        attrs: { class: className, width: size, height: size }
                    });
                }
            }, [name, className, size]);
            return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('siliconflow_api_key') || '');
            const [inputKey, setInputKey] = useState('');
            const [isAuth, setIsAuth] = useState(!!apiKey);
            const [image, setImage] = useState(null);
            const [movieName, setMovieName] = useState('');
            const [ratio, setRatio] = useState('16:9');
            const [dof, setDof] = useState('f/4');
            const [imagesCount, setImagesCount] = useState(1);
            const [isGenerating, setIsGenerating] = useState(false);
            const [results, setResults] = useState([]);
            
            const SELECTED_MODEL = 'Qwen/Qwen-Image-Edit-2509';

            const PROMPT_FACTORY = useMemo(() => {
                // 核心修改：明确描述双人合影场景
                const baseSubject = `A high-quality group photo of the exact person from the original reference image standing and smiling next to the real ${movieName || 'superhero'} character in full costume`;
                const action = `taking a break behind the scenes, both looking at the camera, friendly and candid atmosphere, off-camera moment`;
                const environment = `on a professional Hollywood film set, movie trailers and lighting equipment in the background, cinematic fog, crew members in distance`;
                const aesthetic = `Klein Blue Jazz Western color grading, deep midnight blue shadows vs sunset orange highlights, neo-noir lighting, high-contrast, preservation of original face`;
                const technical = `Shot on Arri Alexa, 35mm wide-angle lens, beautiful Kodak Vision3 film grain, ${dof}, ${ratio} composition, 8k ultra-photorealistic, raw film look`;
                return `${baseSubject}, ${action}. ${environment}. ${aesthetic}. ${technical}.`.replace(/\s+/g, " ");
            }, [movieName, ratio, dof]);

            const handleAction = async () => {
                if (!image) return alert('导演，请先上传人像参考卡 (Upload Target Image)');
                if (!movieName) return alert('导演，请先指定电影名称 (Enter Movie Name)');
                setIsGenerating(true);
                setResults([]);

                try {
                    const apiUrl = 'https://api.siliconflow.cn/v1/images/generations';
                    
                    const payload = {
                        model: SELECTED_MODEL,
                        prompt: PROMPT_FACTORY,
                        n: imagesCount,
                        seed: Math.floor(Math.random() * 10000000),
                        num_inference_steps: 25,
                        cfg: 3.0
                    };

                    if (image) payload.image = image; // 传入您的参考图
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey.trim()}` },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        const msg = data.message || data.error?.message || `HTTP ${response.status}`;
                        throw new Error(`[${response.status}] ${msg}`);
                    }
                    const imgs = data.images || data.data || [];
                    if (imgs.length > 0) {
                        setResults(imgs.map((img, idx) => ({ 
                            url: img.url || `data:image/png;base64,${img.b64_json}`,
                            id: `TAKE_${idx + 1}`,
                            timecode: `02:14:35:${Math.floor(Math.random() * 24)}`,
                            model: 'QWEN_EDIT_PRO'
                        })));
                    } else { throw new Error("API 返回成功但无图像数据"); }
                } catch (error) {
                    alert("片场报错: " + error.message);
                } finally { setIsGenerating(false); }
            };

            useEffect(() => {
                const container = document.getElementById('atmosphere');
                if (!container) return;
                container.innerHTML = '';
                const items = ['♩', '♪', '♫', '♬', '🎬', '🎞', '📽'];
                for(let i=0; i<15; i++) {
                    const el = document.createElement('span');
                    el.className = 'floating';
                    el.innerText = items[Math.floor(Math.random() * items.length)];
                    el.style.left = Math.random() * 95 + '%';
                    el.style.top = Math.random() * 95 + '%';
                    el.style.fontSize = (Math.random() * 30 + 20) + 'px';
                    el.style.color = Math.random() > 0.5 ? '#002FA7' : '#FF4500';
                    el.style.animationDelay = (Math.random() * 5) + 's';
                    container.appendChild(el);
                }
            }, [isAuth]);

            const handleAuth = () => {
                if (inputKey.trim()) {
                    localStorage.setItem('siliconflow_api_key', inputKey.trim());
                    setApiKey(inputKey.trim());
                    setIsAuth(true);
                }
            };

            if (!isAuth) {
                return (
                    <div className="flex-grow flex items-center justify-center p-6 bg-warm-paper">
                        <div className="w-full max-w-sm border-klein-thick bg-white p-10 shadow-[16px_16px_0_rgba(0,47,167,0.1)]">
                            <div className="flex flex-col items-center gap-6 mb-10">
                                <div className="w-20 h-20 rounded-full bg-klein-blue flex items-center justify-center ring-4 ring-sunset-orange">
                                    <Icon name="Clapperboard" className="text-white" size={32} />
                                </div>
                                <h1 className="text-4xl text-klein-blue title-italic uppercase tracking-widest text-center">Hollywood Cut</h1>
                            </div>
                            <div className="flex flex-col gap-6">
                                <input type="password" placeholder="输入 SiliconFlow API Key" className="w-full border-klein p-4 text-center font-mono outline-none focus:border-sunset-orange" value={inputKey} onChange={(e) => setInputKey(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAuth()} />
                                <button onClick={handleAuth} className="w-full bg-klein-blue text-white py-4 font-bold uppercase tracking-[0.2em] hover:bg-sunset-orange transition-colors">进入电影片场</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-grow flex flex-col p-6 lg:p-12 gap-8 pb-20">
                    <header className="flex justify-between items-end border-b-4 border-klein-blue pb-4">
                        <h1 className="text-6xl lg:text-8xl title-italic uppercase leading-none">Hollywood <span className="text-sunset-orange">Cut</span></h1>
                        <button onClick={() => { localStorage.removeItem('siliconflow_api_key'); setApiKey(''); setIsAuth(false); }} className="hidden lg:flex px-5 py-2 border-klein text-xs font-bold uppercase tracking-widest hover:bg-sunset-orange hover:text-white">Reset Key</button>
                    </header>
                    <main className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div className="flex flex-col gap-8">
                            <div className="bg-white border-klein p-6 relative group overflow-hidden">
                                <input type="file" accept="image/*" onChange={(e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onload = (ev) => setImage(ev.target.result); reader.readAsDataURL(file); } }} className="absolute inset-0 opacity-0 cursor-pointer z-10" />
                                <div className="border-2 border-dashed border-klein h-40 flex flex-col items-center justify-center p-2">
                                    {image ? <img src={image} className="max-w-full max-h-full object-contain" /> : <><Icon name="Upload" className="text-klein-blue mb-3" size={32} /><p className="text-xs font-bold uppercase tracking-[0.2em] text-klein-blue">上传人像参考卡</p></>}
                                </div>
                            </div>
                            <div className="bg-white border-klein p-8 flex flex-col gap-6">
                                <input type="text" value={movieName} onChange={(e) => setMovieName(e.target.value)} placeholder="电影名称 (例如: Interstellar)" className="w-full border-b-[3px] border-klein p-2 outline-none text-2xl title-italic text-klein-blue" />
                                <div className="grid grid-cols-2 gap-3">
                                    {['9:16', '3:4', '4:3', '16:9'].map(r => <button key={r} onClick={() => setRatio(r)} className={`py-3 text-[10px] font-bold uppercase border-klein ${ratio === r ? 'bg-sunset-orange border-sunset-orange text-white' : 'text-klein-blue'}`}>{r}</button>)}
                                </div>
                                <div className="grid grid-cols-3 gap-3">
                                    {['f/1.2', 'f/4', 'f/11'].map(d => <button key={d} onClick={() => setDof(d)} className={`py-3 text-[10px] font-bold uppercase border-klein ${dof === d ? 'bg-sunset-orange border-sunset-orange text-white' : 'text-klein-blue'}`}>{d}</button>)}
                                </div>
                            </div>
                            <div className="folded-paper border-klein p-6"><label className="text-xs font-mono font-bold uppercase block mb-3 text-saddle-brown">Director's Prompt</label><textarea readOnly value={PROMPT_FACTORY} className="w-full h-32 font-mono text-[10px] text-klein-blue/60 bg-transparent resize-none outline-none" /></div>
                            <div className="flex gap-4">
                                <div className="w-1/3 flex border-klein h-16">
                                    {[1, 2].map(n => <button key={n} onClick={() => setImagesCount(n)} className={`flex-1 font-mono font-bold ${imagesCount === n ? 'bg-klein-blue text-white' : 'bg-white text-klein-blue'}`}>x{n}</button>)}
                                </div>
                                <button onClick={handleAction} disabled={isGenerating} className={`flex-1 h-16 text-white font-bold text-3xl title-italic uppercase tracking-[0.3em] flex items-center justify-center gap-4 ${isGenerating ? 'bg-gray-400' : 'bg-sunset-orange shadow-[12px_12px_0_rgba(0,47,167,0.1)]'}`}>
                                    {isGenerating ? 'PROCESSING...' : <><Icon name="Star" size={28} /> ACTION !</>}
                                </button>
                            </div>
                        </div>
                        <div className="bg-white border-klein-thick p-3 shadow-[20px_20px_0_rgba(0,47,167,0.08)]">
                            <div className="border-2 border-dashed border-klein w-full aspect-[16/10] bg-warm-paper flex flex-col items-center justify-center relative overflow-hidden">
                                {isGenerating ? <div className="animate-pulse text-2xl font-western text-sunset-orange">DEVELOPING...</div> : results.length > 0 ? <div className="w-full h-full p-2 overflow-y-auto"><img src={results[0].url} className="w-full h-full object-contain" /></div> : <div className="text-7xl lg:text-9xl font-western text-klein-blue/10">NO SIGNAL</div>}
                            </div>
                        </div>
                    </main>
                    <footer className="fixed bottom-0 left-0 right-0 h-10 bg-klein-blue text-warm-paper flex items-center justify-between px-6 text-[10px] font-mono font-bold uppercase z-50"><div>★ Hollywood Cut</div><div className="animate-pulse">{isGenerating ? 'Processing...' : 'AI Connected'}</div></footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
